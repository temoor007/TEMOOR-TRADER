workflows:
  android-native-workflow:
    name: Android Native APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          if [ -d "app" ]; then echo "sdk.dir=$ANDROID_SDK_ROOT" > app/local.properties; fi
      - name: Build Android Debug APK without wrapper
        script: |
          # Agar gradlew nahi hai, to hum direct system ke gradle se build karenge
          gradle assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - temoor007@gmail.com
